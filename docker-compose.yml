services:

  postgres:
    image: postgres:16-alpine
    container_name: mss301-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mss301-net

  redis:
    image: redis:7-alpine
    container_name: mss301-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mss301-net

  mysql:
    image: mysql:8.4
    container_name: mss301-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infrastructure/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mss301-net

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mss301-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - mss301-net

  # One-shot: creates sales_db / supplier_db once SQL Server is healthy (mssql image has no initdb hook).
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mss301-sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    volumes:
      - ./infrastructure/sqlserver/init:/init:ro
    entrypoint: ["/bin/bash", "-c", "/opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -i /init/init-databases.sql"]
    restart: "no"
    networks:
      - mss301-net

  discovery-server:
    build:
      context: .
      dockerfile: infrastructure/discovery-server/Dockerfile
    container_name: mss301-discovery
    ports:
      - "${DISCOVERY_PORT}:8761"
    environment:
      SERVER_PORT: 8761
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mss301-net

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: mss301-auth
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "${AUTH_PORT}:8081"
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://postgres:5432/auth_db
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_MINUTES: ${JWT_ACCESS_MINUTES}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    networks:
      - mss301-net

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: mss301-user
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "${USER_PORT}:8082"
    environment:
      SERVER_PORT: 8082
      DB_URL: jdbc:postgresql://postgres:5432/user_db
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    networks:
      - mss301-net

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: mss301-product
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "${PRODUCT_PORT}:8083"
    environment:
      SERVER_PORT: 8083
      DB_URL: jdbc:mysql://mysql:3306/product_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
    networks:
      - mss301-net

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    container_name: mss301-inventory
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "${INVENTORY_PORT}:8084"
    environment:
      SERVER_PORT: 8084
      DB_URL: jdbc:mysql://mysql:3306/inventory_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
    networks:
      - mss301-net

  sales-service:
    build:
      context: .
      dockerfile: services/sales-service/Dockerfile
    container_name: mss301-sales
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
      discovery-server:
        condition: service_healthy
    ports:
      - "${SALES_PORT}:8085"
    environment:
      SERVER_PORT: 8085
      DB_URL: jdbc:sqlserver://sqlserver:1433;databaseName=sales_db;encrypt=true;trustServerCertificate=true
      DB_USERNAME: sa
      DB_PASSWORD: ${MSSQL_SA_PASSWORD}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
    networks:
      - mss301-net

  supplier-service:
    build:
      context: .
      dockerfile: services/supplier-service/Dockerfile
    container_name: mss301-supplier
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
      discovery-server:
        condition: service_healthy
    ports:
      - "${SUPPLIER_PORT}:8087"
    environment:
      SERVER_PORT: 8087
      DB_URL: jdbc:sqlserver://sqlserver:1433;databaseName=supplier_db;encrypt=true;trustServerCertificate=true
      DB_USERNAME: sa
      DB_PASSWORD: ${MSSQL_SA_PASSWORD}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
    networks:
      - mss301-net

  reporting-service:
    build:
      context: .
      dockerfile: services/reporting-service/Dockerfile
    container_name: mss301-reporting
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "${REPORTING_PORT}:8086"
    environment:
      SERVER_PORT: 8086
      DB_URL: jdbc:postgresql://postgres:5432/reporting_db
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
    networks:
      - mss301-net

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: mss301-notification
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "${NOTIFICATION_PORT}:8088"
    environment:
      SERVER_PORT: 8088
      DB_URL: jdbc:postgresql://postgres:5432/notification_db
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
    networks:
      - mss301-net

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: mss301-gateway
    depends_on:
      discovery-server:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT}:8080"
    environment:
      SERVER_PORT: 8080
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    networks:
      - mss301-net

volumes:
  postgres-data:
  redis-data:
  mysql-data:
  mssql-data:

networks:
  mss301-net:
    driver: bridge
