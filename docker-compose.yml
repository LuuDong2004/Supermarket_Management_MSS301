services:

  mysql:
    image: mysql:8.4
    container_name: mss301-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infrastructure/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mss301-net

  redis:
    image: redis:7-alpine
    container_name: mss301-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mss301-net

  discovery-server:
    build:
      context: .
      dockerfile: infrastructure/discovery-server/Dockerfile
    container_name: mss301-discovery
    ports:
      - "127.0.0.1:${DISCOVERY_PORT}:8761"
    environment:
      SERVER_PORT: 8761
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mss301-net

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: mss301-auth
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "127.0.0.1:${AUTH_PORT}:8081"
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:mysql://mysql:3306/auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_MINUTES: ${JWT_ACCESS_MINUTES}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    networks:
      - mss301-net

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: mss301-user
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "127.0.0.1:${USER_PORT}:8082"
    environment:
      SERVER_PORT: 8082
      DB_URL: jdbc:mysql://mysql:3306/user_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    networks:
      - mss301-net

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: mss301-product
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PRODUCT_PORT}:8083"
    environment:
      SERVER_PORT: 8083
      DB_URL: jdbc:mysql://mysql:3306/product_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    networks:
      - mss301-net

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    container_name: mss301-inventory
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "127.0.0.1:${INVENTORY_PORT}:8084"
    environment:
      SERVER_PORT: 8084
      DB_URL: jdbc:mysql://mysql:3306/inventory_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
    networks:
      - mss301-net

  sales-service:
    build:
      context: .
      dockerfile: services/sales-service/Dockerfile
    container_name: mss301-sales
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "127.0.0.1:${SALES_PORT}:8085"
    environment:
      SERVER_PORT: 8085
      DB_URL: jdbc:mysql://mysql:3306/sales_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SEPAY_WEBHOOK_TOKEN: ${SEPAY_WEBHOOK_TOKEN}
    networks:
      - mss301-net

  supplier-service:
    build:
      context: .
      dockerfile: services/supplier-service/Dockerfile
    container_name: mss301-supplier
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "127.0.0.1:${SUPPLIER_PORT}:8087"
    environment:
      SERVER_PORT: 8087
      DB_URL: jdbc:mysql://mysql:3306/supplier_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    networks:
      - mss301-net

  reporting-service:
    build:
      context: .
      dockerfile: services/reporting-service/Dockerfile
    container_name: mss301-reporting
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "127.0.0.1:${REPORTING_PORT}:8086"
    environment:
      SERVER_PORT: 8086
      DB_URL: jdbc:mysql://mysql:3306/reporting_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
    networks:
      - mss301-net

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: mss301-notification
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "127.0.0.1:${NOTIFICATION_PORT}:8088"
    environment:
      SERVER_PORT: 8088
      DB_URL: jdbc:mysql://mysql:3306/notification_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
    networks:
      - mss301-net

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: mss301-gateway
    depends_on:
      discovery-server:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT}:8080"
    environment:
      SERVER_PORT: 8080
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    networks:
      - mss301-net

volumes:
  mysql-data:
  redis-data:

networks:
  mss301-net:
    driver: bridge
