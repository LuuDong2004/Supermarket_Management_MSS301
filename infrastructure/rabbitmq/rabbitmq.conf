# RabbitMQ base config (reserved for the future event-driven services that
# consume contracts from shared/event-lib). Not started by docker-compose yet.
listeners.tcp.default = 5672
management.tcp.port = 15672

# Credentials are provided via environment in docker-compose when enabled:
#   RABBITMQ_DEFAULT_USER / RABBITMQ_DEFAULT_PASS
default_vhost = mss301
