# Prometheus scrape config (reserved). Each service exposes Spring Boot Actuator
# Prometheus metrics at /actuator/prometheus once micrometer-registry-prometheus
# is added. Wire this into docker-compose when the monitoring stack is enabled.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['auth-service:8081']

  - job_name: 'user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['user-service:8082']
