server:
  port: ${SERVER_PORT:8087}

spring:
  application:
    name: supplier-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/supplier_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api/suppliers/v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.mss301.supplier: INFO
