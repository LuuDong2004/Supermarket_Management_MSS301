server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8}
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true

security:
  jwt:
    # MUST match api-gateway's security.jwt.secret (HMAC key, >= 32 bytes)
    secret: ${JWT_SECRET:Zm9yLWRldi1vbmx5LXN1cGVyLW1hcmtldC1tc3MzMDEtY2hhbmdlLW1lLXBsZWFzZS0xMjM0NTY3ODkw}
    issuer: ${JWT_ISSUER:mss301-auth-service}
    access-token-minutes: ${JWT_ACCESS_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_DAYS:7}
  internal:
    api-key: ${INTERNAL_API_KEY:internal-dev-key-change-me}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api/auth/v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.mss301.auth: INFO
