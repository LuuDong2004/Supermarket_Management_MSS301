server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: sales-service
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=sales_db;encrypt=true;trustServerCertificate=true}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:sa}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api/sales/v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.mss301.sales: INFO
