server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: sales-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sales_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8}
    username: root
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

security:
  internal:
    api-key: ${INTERNAL_API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
    path: /api/sales/v3/api-docs
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}
    path: /swagger-ui.html

logging:
  level:
    com.mss301.sales: INFO

sepay:
  webhook-token: ${SEPAY_WEBHOOK_TOKEN}
  bank-id: ${SEPAY_BANK_ID:MB}
  account-no: ${SEPAY_ACCOUNT_NO:0000000000}
  account-name: ${SEPAY_ACCOUNT_NAME:DEMO ACCOUNT}

