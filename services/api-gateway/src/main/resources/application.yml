server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              # Do not auto-expose every registered service; routes are explicit.
              enabled: false
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**

# Shared HMAC secret — MUST equal auth-service's security.jwt.secret
security:
  jwt:
    secret: ${JWT_SECRET:Zm9yLWRldi1vbmx5LXN1cGVyLW1hcmtldC1tc3MzMDEtY2hhbmdlLW1lLXBsZWFzZS0xMjM0NTY3ODkw}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

springdoc:
  swagger-ui:
    enabled: true
    urls:
      - name: auth-service
        url: /api/auth/v3/api-docs
      - name: user-service
        url: /api/users/v3/api-docs

logging:
  level:
    com.mss301.gateway: INFO
